<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loop Engineering For Everyone — V1 Deck</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --text: #f4f4f5;
      --muted: #b9bdc4;
      --faint: #6c727a;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #FF5898;
      --accent-soft: rgba(255, 88, 152, 0.18);
      --radius: 18px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      overflow: hidden;
      line-height: 1.45;
    }

    .deck-shell {
      width: 100%;
      height: 100dvh;
      min-height: 0;
      padding: clamp(12px, 2vw, 28px);
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .deck {
      position: relative;
      width: min(96vw, calc((100dvh - 120px) * 16 / 9));
      max-height: 100%;
      aspect-ratio: 16 / 9;
      margin: auto;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: var(--radius);
      overflow: hidden;
      background: #0a0b0d;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(14px, 1.5vw, 26px);
      padding: clamp(28px, 3vw, 52px);
      min-width: 0;
    }

    .slide.active {
      display: grid;
    }

    .slide-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(28px, 3.5vw, 52px);
      line-height: 1.1;
      letter-spacing: -0.035em;
      font-weight: 650;
    }

    .slide-lead {
      margin: 0;
      color: var(--muted);
      font-size: clamp(20px, 2.2vw, 32px);
      line-height: 1.45;
      max-width: 1000px;
    }

    .slide-lead code {
      font-family: var(--mono);
      font-size: 0.92em;
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 6px;
      background: var(--accent-soft);
    }

    .slide-lead em {
      color: var(--text);
      font-style: italic;
      font-weight: 550;
    }

    .slide-body {
      min-height: 0;
      width: min(100%, 1400px);
      margin: 0 auto;
      display: grid;
      align-content: center;
      justify-items: center;
    }

    /* Deck visual system: editorial grid, quiet surfaces, one purposeful accent. */
    .slide::before {
      content: "";
      position: absolute;
      top: clamp(28px, 3vw, 52px);
      left: clamp(28px, 3vw, 52px);
      width: 42px;
      height: 2px;
      border-radius: 999px;
      background: var(--accent);
    }

    .slide-title {
      position: relative;
      max-width: 100%;
      padding-top: clamp(13px, 1.25vw, 18px);
    }

    .slide-title::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: clamp(-12px, -0.8vw, -8px);
      width: min(18vw, 170px);
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.56;
    }

    .content-panel,
    .statement {
      width: min(100%, 1020px);
      padding: clamp(32px, 4vw, 56px);
      border-left: 4px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-soft), transparent 72%);
    }

    .statement .slide-lead {
      max-width: 900px;
      color: var(--text);
      font-size: clamp(24px, 2.5vw, 36px);
      line-height: 1.35;
    }

    .feature-quote {
      width: min(100%, 1100px);
      margin: 0;
      padding: clamp(32px, 4vw, 56px) 0 clamp(32px, 4vw, 56px) clamp(32px, 4vw, 56px);
      border-left: 4px solid var(--accent);
      color: var(--text);
      font-size: clamp(36px, 4vw, 64px);
      font-weight: 560;
      letter-spacing: -0.04em;
      line-height: 1.15;
    }

    .drainage-insight {
      width: min(100%, 1100px);
      display: grid;
      gap: clamp(24px, 3vw, 48px);
    }

    .drainage-insight .feature-quote {
      width: 100%;
    }

    .supporting-quote {
      max-width: 900px;
      margin: 0 0 0 clamp(32px, 4vw, 56px);
      color: var(--muted);
      font-size: clamp(22px, 2vw, 32px);
      line-height: 1.45;
    }

    .supporting-quote strong {
      color: var(--text);
      font-weight: 580;
    }

    .hero-statement {
      width: min(100%, 1020px);
      margin: 0;
      padding: clamp(20px, 2.5vw, 36px) 0 clamp(20px, 2.5vw, 36px) clamp(24px, 3vw, 42px);
      border-left: 2px solid var(--accent);
      color: var(--text);
      font-size: clamp(23px, 2.15vw, 38px);
      font-weight: 520;
      letter-spacing: -0.03em;
      line-height: 1.2;
      text-align: left;
    }

    .title-slide::before,
    .title-slide .slide-title::after {
      display: none;
    }

    .title-slide h1 {
      background: linear-gradient(110deg, var(--text) 22%, #ffc1da 70%, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .slide-foot {
      display: none;
    }

    .status {
      display: block;
    }

    .title-slide {
      grid-template-rows: 1fr;
      place-items: center;
      padding: clamp(36px, 4vw, 72px);
      text-align: center;
    }

    .title-slide > div:nth-of-type(2) {
      width: min(100%, 1180px);
      padding: 0 8px 14px;
      transform: translateY(-2%);
    }

    .title-slide h1 {
      display: block;
      max-width: 100%;
      padding: 0 0.04em 0.18em;
      font-size: clamp(42px, 6vw, 96px);
      letter-spacing: -0.06em;
      line-height: 1.16;
      overflow: visible;
    }

    .title-credit {
      margin: clamp(48px, 6vw, 72px) 0 0;
      color: var(--muted);
      font-size: clamp(26px, 2.5vw, 36px);
      line-height: 1.45;
      letter-spacing: -0.015em;
    }

    .title-credit strong {
      color: var(--text);
      font-weight: 600;
    }

    .slide-body-agent {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 18px;
      text-align: center;
    }

    .slide-body-agent .slide-lead {
      margin: 0 auto 32px;
      max-width: 1000px;
      text-align: center;
    }

    .react-note {
      margin: 32px auto 0;
      color: var(--muted);
      font-size: clamp(20px, 2.2vw, 32px);
      line-height: 1.45;
      max-width: 1100px;
      text-align: center;
    }

    .loops-today-list {
      list-style: none;
      margin: 16px auto 32px;
      padding: 0;
      max-width: 1000px;
      width: 100%;
      display: grid;
      gap: 16px;
      text-align: left;
    }

    .loops-today-list li {
      position: relative;
      padding: 20px 24px 20px 56px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: clamp(18px, 1.8vw, 26px);
      letter-spacing: -0.005em;
    }

    .loops-today-list li::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .loops-today-takeaway {
      margin: 0 auto;
      max-width: 1000px;
      padding: 24px 32px;
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      background: rgba(255, 88, 152, 0.06);
      color: var(--text);
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.45;
      text-align: center;
      user-select: text;
    }

    .barrier-layout {
      width: min(100%, 1320px);
      display: grid;
      grid-template-columns: minmax(0, 1.16fr) minmax(0, 0.84fr);
      gap: clamp(32px, 5vw, 80px);
      align-items: stretch;
    }

    .barrier-grid {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: clamp(18px, 2.5vw, 32px);
    }

    .barrier-card {
      min-height: 114px;
      display: grid;
      align-content: center;
      gap: 24px;
      padding: clamp(24px, 3vw, 40px);
      border: 1px solid var(--line);
      border-top: 4px solid var(--accent);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015));
    }

    .codex-callout {
      min-height: 260px;
      display: grid;
      align-content: center;
      gap: clamp(12px, 1.5vw, 20px);
      padding: clamp(24px, 3vw, 42px);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255, 88, 152, 0.10), rgba(255, 255, 255, 0.018));
    }

    .codex-harness-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .codex-harness-steps span {
      border: 1px solid rgba(255, 88, 152, 0.35);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--text);
      background: rgba(255, 88, 152, 0.07);
      font-family: var(--mono);
      font-size: clamp(11px, 0.9vw, 14px);
    }

    .codex-callout-label {
      margin: 0;
      color: var(--accent);
      font-family: var(--mono);
      font-size: clamp(13px, 1.15vw, 17px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .codex-callout strong {
      color: var(--text);
      font-size: clamp(26px, 2.8vw, 40px);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .codex-callout p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 1.55vw, 23px);
      line-height: 1.4;
    }

    .codex-callout a {
      color: var(--accent);
      font-family: var(--mono);
      font-size: clamp(13px, 1.1vw, 16px);
      text-decoration: none;
    }

    .codex-callout a:hover {
      text-decoration: underline;
    }

    .accessibility-bridge {
      width: min(100%, 1320px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.92fr);
      gap: clamp(32px, 5vw, 80px);
      align-items: center;
    }

    .bridge-panel {
      min-height: 300px;
      padding: clamp(24px, 3vw, 40px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015));
    }

    .bridge-panel-label {
      margin: 0 0 16px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: clamp(12px, 1vw, 15px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .bridge-outer-loop {
      display: grid;
      gap: 10px;
    }

    .bridge-outer-loop span {
      color: var(--text);
      font-size: clamp(18px, 1.7vw, 25px);
      line-height: 1.2;
    }

    .bridge-outer-loop span::before {
      content: "→";
      margin-right: 10px;
      color: var(--accent);
    }

    .bridge-role-panel {
      position: relative;
      display: grid;
      overflow: hidden;
    }

    .bridge-role-view {
      grid-area: 1 / 1;
      transition: opacity 560ms ease, transform 560ms ease;
    }

    .bridge-human-view {
      opacity: 1;
      transform: translateX(0);
    }

    .bridge-adal-view {
      display: grid;
      place-content: center;
      justify-items: center;
      gap: 18px;
      opacity: 0;
      transform: translateX(28px);
      pointer-events: none;
    }

    .bridge-adal-arrow {
      color: var(--accent);
      font-size: clamp(42px, 5vw, 72px);
      line-height: 0.8;
    }

    .bridge-adal-node {
      width: clamp(150px, 15vw, 210px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 20px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 88, 152, 0.17), rgba(255, 88, 152, 0.04) 65%, transparent 72%);
      color: var(--text);
      font-size: clamp(26px, 2.5vw, 38px);
      font-weight: 650;
      line-height: 1.05;
      text-align: center;
    }

    .bridge-adal-view p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(18px, 1.65vw, 25px);
      line-height: 1.4;
      max-width: 18ch;
    }

    .bridge-role-panel.is-swapped .bridge-human-view {
      opacity: 0;
      transform: translateX(-28px);
      pointer-events: none;
    }

    .bridge-role-panel.is-swapped .bridge-adal-view {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      .bridge-role-view {
        transition: none;
      }
    }

    .bridge-capabilities {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .bridge-capabilities span {
      display: grid;
      min-height: 86px;
      place-items: center;
      border: 1px solid rgba(255, 88, 152, 0.34);
      border-radius: 12px;
      padding: 12px;
      color: var(--text);
      background: rgba(255, 88, 152, 0.05);
      font-size: clamp(16px, 1.4vw, 21px);
      font-weight: 560;
      line-height: 1.15;
      text-align: center;
    }

    .bridge-arrow {
      color: var(--accent);
      font-size: clamp(32px, 4vw, 56px);
      line-height: 1;
    }

    .slide[aria-labelledby="slide-adal-how-title"] .slide-title {
      font-size: clamp(36px, 4vw, 58px);
      max-width: 100%;
    }

    .agent-line {
      margin: 0 auto;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: var(--mono);
      font-size: clamp(14px, 1.05vw, 18px);
      letter-spacing: -0.005em;
      text-align: center;
      display: inline-block;
      max-width: 100%;
    }

    .agent-cite {
      display: block;
      color: var(--muted);
      font-family: var(--mono);
      font-size: clamp(16px, 1.2vw, 20px);
      letter-spacing: 0.04em;
      text-decoration: none;
      opacity: 0.78;
      transition: color 160ms ease-out, opacity 160ms ease-out;
    }

    .agent-cite:hover,
    .agent-cite:focus-visible {
      color: var(--accent);
      opacity: 1;
      outline: none;
    }

    .agent-cite-accent {
      color: var(--accent);
      opacity: 0.95;
    }

    .agent-cite-stack {
      position: absolute;
      right: clamp(20px, 2vw, 36px);
      bottom: clamp(16px, 1.6vw, 28px);
      display: grid;
      gap: 4px;
      text-align: right;
    }

    .deck-author {
      position: absolute;
      left: clamp(20px, 2vw, 36px);
      bottom: clamp(16px, 1.6vw, 28px);
      z-index: 6;
      color: var(--muted);
      font-family: var(--mono);
      font-size: clamp(16px, 1.45vw, 22px);
      letter-spacing: 0.02em;
      text-decoration: none;
      opacity: 0.9;
      transition: color 160ms ease-out, opacity 160ms ease-out;
    }

    .deck-author:hover,
    .deck-author:focus-visible {
      color: var(--accent);
      opacity: 1;
      outline: none;
    }

    .lifecycle {
      width: min(100%, 1100px);
    }

    .lifecycle-diagram {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
      font-family: var(--sans);
    }

    .slide[aria-labelledby="slide-5-title"] .slide-body {
      width: min(100%, 1320px);
      grid-template-columns: minmax(0, 0.82fr) minmax(0, 1.18fr);
      gap: clamp(28px, 4vw, 72px);
      align-items: center;
      justify-items: stretch;
    }

    .lifecycle-copy {
      display: grid;
      gap: clamp(22px, 2.4vw, 36px);
      align-content: center;
      max-width: 510px;
    }

    .lifecycle-kicker {
      margin: 0;
      color: var(--accent);
      font-family: var(--mono);
      font-size: clamp(13px, 1vw, 17px);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .lifecycle-reasons {
      list-style: none;
      display: grid;
      gap: clamp(18px, 2vw, 28px);
      margin: 0;
      padding: 0;
      color: var(--text);
      font-size: clamp(22px, 1.9vw, 32px);
      line-height: 1.28;
    }

    .lifecycle-reasons li {
      position: relative;
      padding-left: clamp(26px, 2.4vw, 38px);
    }

    .lifecycle-reasons li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.46em;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .slide[aria-labelledby="slide-5-title"] .lifecycle {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide[aria-labelledby="slide-5-title"] .lifecycle-diagram {
      width: 100%;
      height: min(100%, 490px);
      max-height: 100%;
    }

    .reference-list {
      display: grid;
      gap: 6px;
      max-height: 100%;
      overflow: auto;
      padding-right: 6px;
    }

    .reference-list a {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      padding: 14px 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      text-decoration: none;
      font-size: clamp(18px, 1.8vw, 24px);
    }

    .reference-list a:focus-visible,
    .reference-list a:hover {
      outline: none;
      border-color: rgba(255, 88, 152, 0.6);
      color: var(--accent);
    }

    .reference-list small {
      color: var(--muted);
      font-family: var(--mono);
      font-size: clamp(14px, 1.2vw, 18px);
    }

    .reference-group + .reference-group {
      margin-top: 24px;
    }

    .reference-group h2 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: clamp(16px, 1.4vw, 20px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .references-grid {
      width: min(100%, 1400px);
      max-height: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px 32px;
      overflow: auto;
      padding: 4px 16px 4px 4px;
    }

    .references-grid .reference-group + .reference-group {
      margin-top: 0;
    }

    .references-grid .reference-list {
      gap: 4px;
      overflow: visible;
      padding-right: 0;
    }

    .references-grid .reference-list a {
      gap: 12px;
      padding: 10px 14px;
      font-size: clamp(16px, 1.4vw, 20px);
      line-height: 1.25;
    }

    .references-grid .reference-list small {
      font-size: clamp(12px, 1.1vw, 16px);
      white-space: nowrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .deck-controls {
      width: min(96vw, calc(86vh * 16 / 9));
      margin: 14px auto 0;
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: clamp(14px, 1.2vw, 18px);
      letter-spacing: 0.06em;
    }

    .control-button {
      appearance: none;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(10, 10, 12, 0.6);
      color: var(--text);
      font: 700 20px/1 var(--mono);
      cursor: pointer;
    }

    .control-button:hover,
    .control-button:focus-visible {
      outline: none;
      border-color: var(--accent);
    }

    .control-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .progress-track {
      flex: 1;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 10%;
      background: var(--accent);
      transition: width 180ms ease-out;
    }

    .status {
      white-space: nowrap;
    }

    .slide-body-expansion {
      width: min(100%, 1400px);
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(340px, 1.1fr);
      align-items: center;
      gap: clamp(28px, 4vw, 68px);
      text-align: left;
    }

    .expansion-copy {

<body>
  <main class="deck-shell">
    <section class="deck" id="deck-root" aria-label="Loop Engineering For Everyone V1 deck">
      <div id="deck-loading" style="position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);font-family:var(--mono);">Loading slides…</div>
      <a class="deck-author" href="https://x.com/panda_liyin" target="_blank" rel="noopener noreferrer">@panda_liyin</a>
    </section>

    <nav class="deck-controls" aria-label="Slide navigation">
      <button class="control-button" type="button" data-action="prev" aria-label="Previous slide">‹</button>
      <button class="control-button" type="button" data-action="next" aria-label="Next slide">›</button>
      <div class="progress-track" aria-hidden="true"><div class="progress-fill"></div></div>
      <div class="status" aria-live="polite">00 / 00</div>
    </nav>
  </main>

  <script>
    (() => {
      const deckRoot = document.getElementById('deck-root');
      const loading = document.getElementById('deck-loading');
      const fill = document.querySelector('.progress-fill');
      const status = document.querySelector('.status');
      const prevButton = document.querySelector('[data-action="prev"]');
      const nextButton = document.querySelector('[data-action="next"]');

      let slides = [];
      let current = 0;

      function render() {
        if (!slides.length) return;
        slides.forEach((slide, index) => {
          slide.classList.toggle('active', index === current);
          slide.setAttribute('aria-hidden', index === current ? 'false' : 'true');
          const footer = slide.querySelector('.slide-foot span');
          if (footer) {
            footer.textContent = `${String(index + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
          }
        });

        const rolePanel = slides[current].querySelector('.bridge-role-panel');
        if (rolePanel) rolePanel.classList.remove('is-swapped');

        fill.style.width = `${((current + 1) / slides.length) * 100}%`;
        status.textContent = `${String(current + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
        prevButton.disabled = current === 0;
        nextButton.disabled = current === slides.length - 1;
        document.title = `(${current + 1}/${slides.length}) Loop Engineering For Everyone`;

        const url = new URL(window.location.href);
        url.searchParams.set('slide', String(current + 1));
        window.history.replaceState({}, '', url);
      }

      function goTo(index) {
        current = Math.max(0, Math.min(slides.length - 1, index));
        render();
      }

      function next() {
        const rolePanel = slides[current]?.querySelector('.bridge-role-panel');
        if (rolePanel && !rolePanel.classList.contains('is-swapped')) {
          rolePanel.classList.add('is-swapped');
          return;
        }
        goTo(current + 1);
      }

      function prev() { goTo(current - 1); }

      prevButton.addEventListener('click', prev);
      nextButton.addEventListener('click', next);

      window.addEventListener('keydown', (event) => {
        if (event.altKey || event.ctrlKey || event.metaKey) return;
        if (event.key === 'ArrowRight' || event.key === ' ') {
          event.preventDefault();
          next();
        } else if (event.key === 'ArrowLeft') {
          event.preventDefault();
          prev();
        } else if (event.key === 'Home') {
          event.preventDefault();
          goTo(0);
        } else if (event.key === 'End') {
          event.preventDefault();
          goTo(slides.length - 1);
        }
      });

      window.__loopEngineeringDeck = {
        goToSlide: (slideNumber) => goTo(Number(slideNumber) - 1),
        next,
        prev,
        getState: () => ({ current: current + 1, total: slides.length, index: window.__deckIndex || null })
      };

      async function loadDeck() {
        const indexRes = await fetch('slides/index.json', { cache: 'no-store' });
        if (!indexRes.ok) throw new Error('Failed to load slides/index.json');
        const index = await indexRes.json();
        window.__deckIndex = index;

        const enabled = (index.slides || []).filter((s) => s.enabled !== false);
        const parts = await Promise.all(enabled.map(async (entry) => {
          const res = await fetch('slides/' + entry.file, { cache: 'no-store' });
          if (!res.ok) throw new Error('Failed to load ' + entry.file);
          return { entry, html: await res.text() };
        }));

        loading.remove();
        const frag = document.createDocumentFragment();
        for (const part of parts) {
          const wrap = document.createElement('div');
          wrap.innerHTML = part.html.trim();
          const slide = wrap.querySelector('article.slide') || wrap.firstElementChild;
          if (!slide) continue;
          slide.dataset.slideId = part.entry.id || '';
          slide.dataset.slideFile = part.entry.file || '';
          slide.classList.remove('active');
          frag.appendChild(slide);
        }
        deckRoot.appendChild(frag);
        slides = Array.from(deckRoot.querySelectorAll('.slide'));

        const querySlide = Number(new URLSearchParams(window.location.search).get('slide'));
        current = Number.isFinite(querySlide) && querySlide >= 1 && querySlide <= slides.length ? querySlide - 1 : 0;
        render();
      }

      loadDeck().catch((err) => {
        console.error(err);
        if (loading) {
          loading.textContent = 'Could not load slides. Serve this folder over HTTP and check slides/index.json.';
          loading.style.color = '#ff8fb8';
        }
      });
    })();
  </script>
</body>
</html>
