<article class="slide" aria-labelledby="slide-2-title">
        <h2 id="slide-2-title" class="slide-title">Agents: From ReAct to Coding Agents</h2>
        <div class="slide-body">
          <div class="agent-era-panel">
            <div class="react-prompt-frame">
              <img src="materials/react-zero-shot-prompt.png" alt="A zero-shot ReAct prompt that defines Search and Finish actions plus a Thought and Action response format.">
            </div>
            <p class="agent-era-caption">the first agent · 2022</p>
          </div>
          <div class="agent-today-panel">

                  <feGaussianBlur stdDeviation="5" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>

              <circle cx="330" cy="210" r="150" fill="rgba(255, 88, 152, 0.035)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5"/>

                <g transform="translate(330 58)">
                  <circle r="43" fill="#161116" stroke="var(--accent)" stroke-width="2" filter="url(#agentNodeGlow)"/>
                  <text y="6" fill="var(--text)">Model</text>
                </g>
                <g transform="translate(482 210)">
                  <circle r="43" fill="#131317" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5"/>
                  <text y="6" fill="var(--text)">Decide</text>
                </g>
                <g transform="translate(330 362)">
                  <circle r="43" fill="#131317" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5"/>

              <path d="M 535 210 H 650" fill="none" stroke="rgba(255, 255, 255, 0.42)" stroke-width="2" stroke-linecap="round" marker-end="url(#agentLoopArrow)"/>
              <g transform="translate(735 210)">
